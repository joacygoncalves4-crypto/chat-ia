<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converse com o Ricardo</title>
    <meta name="description" content="Converse com o Ricardo — especialista direto, estratégico e sem enrolação. Uma experiência exclusiva de conversa.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Grain overlay -->
    <div class="grain-overlay" aria-hidden="true"></div>

    <!-- Main layout -->
    <div class="app-layout">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-inner">
                <!-- Brand mark -->
                <div class="brand-mark">
                    <div class="monogram">R</div>
                    <div class="brand-line"></div>
                </div>

                <!-- Identity -->
                <div class="identity">
                    <h1 class="identity-name">Ricardo</h1>
                    <p class="identity-tagline">Estratégia.<br>Clareza.<br>Sem rodeios.</p>
                </div>

                <!-- Status -->
                <div class="status-block">
                    <div class="status-dot"></div>
                    <span class="status-text">Online agora</span>
                </div>

                <!-- Traits -->
                <div class="traits">
                    <span class="trait">Direto</span>
                    <span class="trait">Estratégico</span>
                    <span class="trait">Prático</span>
                </div>

                <!-- Bottom info -->
                <div class="sidebar-footer">
                    <p class="footer-note">Experiência exclusiva</p>
                    <div class="footer-line"></div>
                    <p class="footer-copy">© 2026</p>
                </div>
            </div>
        </aside>

        <!-- Mobile header -->
        <header class="mobile-header" id="mobileHeader">
            <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
                <span></span>
                <span></span>
            </button>
            <div class="mobile-brand">
                <span class="mobile-monogram">R</span>
                <span class="mobile-name">Ricardo</span>
            </div>
            <div class="mobile-status">
                <div class="status-dot"></div>
            </div>
        </header>

        <!-- Chat area -->
        <main class="chat-area">
            <!-- Chat header -->
            <div class="chat-header">
                <div class="chat-header-left">
                    <span class="chat-label">Conversa</span>
                    <span class="chat-separator">/</span>
                    <span class="chat-date" id="chatDate"></span>
                </div>
                <div class="chat-header-right">
                    <button class="btn-clear" id="btnClear" title="Nova conversa">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        <span>Nova</span>
                    </button>
                </div>
            </div>

            <!-- Messages container -->
            <div class="messages-container" id="messagesContainer">
                <div class="messages-inner" id="messagesInner">
                    <!-- Welcome block -->
                    <div class="welcome-block" id="welcomeBlock">
                        <div class="welcome-monogram">R</div>
                        <h2 class="welcome-title">E aí, tudo certo?</h2>
                        <p class="welcome-subtitle">Sou o Ricardo. Me conta o que você precisa — sem enrolação, vamos direto ao ponto.</p>
                        <div class="welcome-suggestions" id="welcomeSuggestions">
                            <button class="suggestion-chip" data-message="Preciso de ajuda com estratégia de negócios">
                                <span class="chip-icon">→</span>
                                Estratégia de negócios
                            </button>
                            <button class="suggestion-chip" data-message="Quero organizar melhor minhas ideias">
                                <span class="chip-icon">→</span>
                                Organizar ideias
                            </button>
                            <button class="suggestion-chip" data-message="Me ajuda a resolver um problema">
                                <span class="chip-icon">→</span>
                                Resolver um problema
                            </button>
                        </div>
                    </div>

                    <!-- Messages will be injected here -->
                </div>
            </div>

            <!-- Typing indicator -->
            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-avatar">R</div>
                <div class="typing-content">
                    <span class="typing-name">Ricardo</span>
                    <div class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>

            <!-- Input area -->
            <div class="input-area" id="inputArea">
                <div class="input-wrapper">
                    <div class="input-accent"></div>
                    <textarea 
                        id="messageInput" 
                        class="message-input" 
                        placeholder="Escreva sua mensagem..."
                        rows="1"
                        maxlength="2000"
                        aria-label="Campo de mensagem"
                    ></textarea>
                    <button class="send-btn" id="sendBtn" disabled aria-label="Enviar mensagem">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </button>
                </div>
                <div class="input-footer">
                    <span class="char-count" id="charCount">0 / 2000</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile sidebar overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <script src="js/app.js"></script>
</body>
</html>
